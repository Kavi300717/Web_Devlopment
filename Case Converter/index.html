<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Converter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <h1>Case Converter</h1>
        <textarea name="inputText" id="tInput" class="inputText" placeholder="Enter your input here"></textarea>

        <div class="btn">
            <button class="btn-1" onclick="toUpper()">Uppercase</button>
            <button class="btn-2" onclick="toLower()">Lowercase</button>
            <button class="btn-3" onclick="toTitle()">Titlecase</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
